<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psicoanálisis Freud · Plan de lectura</title>
  <meta name="description" content="Plan de lectura interactivo para Psicoanálisis Freud - Cátedra Laznik (UBA).">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2317182b'/%3E%3Cpath d='M18 13h22a6 6 0 0 1 6 6v32a3 3 0 0 1-3 3H21a7 7 0 0 1-7-7V17a4 4 0 0 1 4-4z' fill='%23f0b35b'/%3E%3Cpath d='M21 17h20a2 2 0 0 1 2 2v29H22a5 5 0 0 0-5 5V21a4 4 0 0 1 4-4z' fill='%23f4f2ec' opacity='.92'/%3E%3Cpath d='M24 25h13M24 32h13M24 39h10' stroke='%2317182b' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #0f1020; --panel: #17182b; --panel2: #20223a; --text: #f4f2ec;
      --muted: #b8b6ca; --accent: #f0b35b; --ok: #74d99f;
      --border: rgba(255,255,255,.12); --shadow: rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #272044 0%, var(--bg) 42%);
      color: var(--text); line-height: 1.42;
    }
    .page { height: 100vh; display: flex; flex-direction: column; }
    header {
      padding: 22px 18px 10px; max-width: 1220px; width: 100%; margin: 0 auto;
      display: flex; gap: 16px; align-items: start; justify-content: space-between; flex: 0 0 auto;
    }
    h1 { margin: 0; font-size: clamp(25px, 3.5vw, 38px); letter-spacing: -.03em; line-height: 1.05; }
    .top-progress {
      display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-wrap: wrap;
      color: var(--muted); font-size: 13px; text-align: right; min-width: 230px; padding-top: 2px;
    }
    .progress-pill {
      background: rgba(23,24,43,.84); border: 1px solid var(--border);
      border-radius: 999px; padding: 7px 10px; white-space: nowrap;
    }
    .progress-pill strong { color: var(--accent); }
    .icon-btn {
      width: 34px; height: 34px; display: inline-grid; place-items: center; border-radius: 999px;
      border: 1px solid var(--border); background: rgba(32,34,58,.9); color: var(--muted);
      cursor: pointer; font-size: 16px;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--text); }
    .github-link {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(32,34,58,.9);
      color: var(--muted);
      text-decoration: none;
      position: relative;
    }
    .github-link:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .github-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    .github-link::after {
      content: "Ver proyecto en GitHub";
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      opacity: 0;
      transform: translateY(-2px);
      pointer-events: none;
      transition: opacity .08s ease, transform .08s ease;
      background: #252743;
      color: var(--text);
      border: 1px solid rgba(240,179,91,.35);
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 12px;
      white-space: nowrap;
      box-shadow: 0 10px 24px var(--shadow);
      z-index: 30;
    }
    .github-link:hover::after {
      opacity: 1;
      transform: translateY(0);
    }
    .reset-wrap { position: relative; display: inline-grid; place-items: center; }
    .reset-tip {
      position: absolute; top: calc(100% + 8px); right: 0; opacity: 0; transform: translateY(-2px);
      pointer-events: none; transition: opacity .08s ease, transform .08s ease;
      background: #252743; color: var(--text); border: 1px solid rgba(240,179,91,.35);
      border-radius: 10px; padding: 7px 9px; font-size: 12px; white-space: nowrap;
      box-shadow: 0 10px 24px var(--shadow); z-index: 30;
    }
    .reset-wrap:hover .reset-tip { opacity: 1; transform: translateY(0); }

    .tabs {
      max-width: 1220px; width: calc(100% - 32px); margin: 8px auto 14px; padding: 6px;
      background: rgba(23,24,43,.84); border: 1px solid var(--border); border-radius: 18px;
      display: flex; gap: 8px; align-items: center; flex: 0 0 auto;
    }
    .tab {
      flex: 0 0 180px; background: transparent; color: var(--muted); border: 1px solid transparent;
      border-radius: 14px; padding: 12px 14px; font-weight: 800; cursor: pointer; font-size: 15px;
    }
    .tab.active {
      background: var(--panel2); color: var(--text); border-color: var(--border);
      box-shadow: inset 0 0 0 1px rgba(240,179,91,.18);
    }
    .tab small { color: var(--accent); font-weight: 700; margin-left: 6px; }
    .tab-tools { margin-left: auto; display: flex; gap: 10px; align-items: center; min-width: 0; }
    .search {
      width: 210px; max-width: 26vw; background: rgba(32,34,58,.86); color: var(--text);
      border: 1px solid var(--border); border-radius: 999px; padding: 9px 12px;
      font-size: 13px; outline: none;
    }
    .search:focus { border-color: rgba(240,179,91,.55); }
    .toggle {
      display: inline-flex; align-items: center; gap: 7px; color: var(--muted);
      font-size: 13px; white-space: nowrap; cursor: pointer; user-select: none; padding-right: 4px;
    }
    .toggle input { width: 15px; height: 15px; accent-color: var(--accent); }

    main {
      max-width: 1220px; width: 100%; margin: 0 auto; padding: 0 16px 16px;
      flex: 1 1 auto; min-height: 0;
    }
    .board {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px;
      align-items: stretch; height: 100%; min-height: 0;
    }
    .column {
      background: rgba(23,24,43,.76); border: 1px solid var(--border); border-radius: 20px;
      overflow: hidden; min-height: 0; display: flex; flex-direction: column;
    }
    .column h2 {
      margin: 0; padding: 13px 14px; background: rgba(255,255,255,.045);
      border-bottom: 1px solid var(--border); font-size: 17px;
      display: grid; grid-template-columns: minmax(90px, 1fr) auto auto;
      gap: 10px; align-items: center;
      flex: 0 0 auto; position: sticky; top: 0; z-index: 3; backdrop-filter: blur(8px);
    }
    .column-title { font-weight: 800; }
    .dot-progress {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      max-width: 150px;
      overflow: hidden;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      border: 1px solid rgba(244,242,236,.32);
      opacity: .75;
      flex: 0 0 auto;
    }
    .dot.done {
      border-color: rgba(116,217,159,.95);
      background: rgba(116,217,159,.95);
      opacity: .95;
    }
    .page-effort {
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 650;
      white-space: nowrap;
      text-align: right;
    }
    .column-body { overflow: auto; min-height: 0; scrollbar-width: thin; scrollbar-color: rgba(240,179,91,.45) transparent; }

    .reading {
      display: grid; grid-template-columns: 32px 1fr 24px; gap: 9px;
      padding: 12px 12px 22px; border-bottom: 1px solid var(--border); align-items: start; position: relative;
    }
    .reading:last-child { border-bottom: 0; }
    .reading.done {
      filter: grayscale(1);
      opacity: .72;
    }
    .reading.done .title {
      color: rgba(244,242,236,.72);
    }
    .reading.done .year,
    .reading.done .unit-prefix,
    .reading.done .bookline strong {
      color: rgba(244,242,236,.58);
    }
    .reading.done .fake-check {
      background: rgba(244,242,236,.62) !important;
      border-color: rgba(244,242,236,.42) !important;
      box-shadow: none !important;
    }
    .reading.active-instance {
      box-shadow: inset 3px 0 0 rgba(240,179,91,.24);
    }
    .reading.duplicate-secondary {
      opacity: .48;
      box-shadow: none;
    }
    .reading.duplicate-secondary:hover {
      opacity: .68;
    }
    .check-wrap { width: 20px; height: 20px; margin-top: 2px; position: relative; cursor: pointer; }
    .check-wrap input { position: absolute; inset: 0; opacity: 0; cursor: pointer; margin: 0; }
    .fake-check {
      width: 20px; height: 20px; border-radius: 7px; border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.035); display: grid; place-items: center;
      transition: border-color .12s ease, background .12s ease, box-shadow .12s ease;
    }
    .fake-check::after {
      content: ""; width: 8px; height: 5px; border-left: 2px solid var(--bg); border-bottom: 2px solid var(--bg);
      transform: rotate(-45deg) scale(.6); opacity: 0; margin-top: -2px; transition: opacity .12s ease, transform .12s ease;
    }
    .check-wrap:hover .fake-check { border-color: rgba(116,217,159,.65); background: rgba(116,217,159,.08); }
    .check-wrap input:checked + .fake-check {
      border-color: rgba(116,217,159,.85); background: var(--ok); box-shadow: 0 0 0 3px rgba(116,217,159,.12);
    }
    .check-wrap input:checked + .fake-check::after { opacity: 1; transform: rotate(-45deg) scale(1); }

    .title { font-weight: 760; font-size: 14.5px; cursor: pointer; }
    .unit-prefix { color: var(--accent); font-weight: 850; margin-right: 4px; white-space: nowrap; }
    .year {
      color: var(--accent);
      font-weight: 650;
      font-size: .88em;
      margin-left: 4px;
    }
    .bookline {
      color: var(--muted); font-size: 12px; margin-top: 4px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .bookline strong { color: var(--accent); font-weight: 750; }
    .dup-mark {
      display: inline-flex; align-items: center; justify-content: center; height: 17px; min-width: 17px;
      padding: 0 5px; border-radius: 999px; border: 1px solid rgba(240,179,91,.35);
      color: var(--accent); font-size: 11px; cursor: help;
    }
    .help {
      display: inline-grid; place-items: center; width: 16px; height: 16px;
      border: 1px solid var(--border); border-radius: 999px; color: var(--muted);
      font-size: 11px; cursor: pointer; user-select: none;
    }
    .help:hover, .dup-mark:hover { color: var(--text); border-color: var(--accent); }
    #helpBubble {
      display: none; position: fixed; z-index: 9999; max-width: 320px;
      background: #252743; color: var(--text); border: 1px solid rgba(240,179,91,.35);
      box-shadow: 0 12px 30px var(--shadow); border-radius: 12px; padding: 10px 12px;
      font-size: 12.5px; line-height: 1.35;
    }
    .expand-btn {
      border: 0; background: transparent; color: var(--muted); cursor: pointer;
      font-size: 16px; line-height: 1; padding: 2px; transform: rotate(0deg);
      transition: transform .12s ease;
    }
    .reading.open .expand-btn { transform: rotate(90deg); color: var(--accent); }
    .details {
      display: none; grid-column: 2 / 4; color: var(--muted);
      font-size: 12.5px; margin-top: -4px; padding-bottom: 2px;
    }
    .reading.open .details { display: block; }
    .guide-note { border-left: 2px solid rgba(240,179,91,.5); padding-left: 9px; color: #d9d6e6; }
    .notes { color: #d5d1be; margin-top: 6px; }
    .warning-note {
      margin-top: 8px;
      padding: 8px 9px;
      border-radius: 10px;
      background: rgba(240,179,91,.10);
      border: 1px solid rgba(240,179,91,.26);
      color: #f1dfbe;
    }
    .external-link {
      display: inline-flex;
      margin-top: 7px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 750;
      font-size: 12.5px;
    }
    .external-link:hover {
      text-decoration: underline;
    }
    .drag-handle {
      position: absolute; right: 10px; bottom: 8px; opacity: 0; color: var(--muted);
      cursor: grab; user-select: none; font-size: 15px; line-height: 1; padding: 4px;
    }
    .reading:hover .drag-handle, .reading.open .drag-handle { opacity: .65; }
    .drag-handle:hover { opacity: 1; color: var(--accent); }
    .reading.dragging { opacity: .35; outline: 1px dashed rgba(240,179,91,.55); background: rgba(240,179,91,.06); }
    .reading.drag-over { box-shadow: inset 0 2px 0 var(--accent); }
    .empty { padding: 24px 14px; color: var(--muted); }

    .guide-view {
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
      gap: 14px;
      height: 100%;
      min-height: 0;
    }
    .guide-tree,
    .guide-detail {
      background: rgba(23,24,43,.76);
      border: 1px solid var(--border);
      border-radius: 20px;
      min-height: 0;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(240,179,91,.45) transparent;
    }
    .guide-tree { padding: 14px; }
    .guide-module + .guide-module { margin-top: 18px; }
    .guide-module-title {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.25;
    }
    .guide-module-title span {
      display: block;
      color: var(--accent);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 2px;
    }
    .guide-block { margin-top: 12px; }
    .guide-block-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .guide-topic-btn {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 8px 9px;
      font: inherit;
      font-size: 13px;
      line-height: 1.25;
    }
    .guide-topic-btn:hover { color: var(--text); border-color: rgba(240,179,91,.22); }
    .guide-topic-btn.active {
      color: var(--text);
      background: rgba(32,34,58,.9);
      border-color: rgba(240,179,91,.34);
    }
    .guide-detail { padding: 20px; }
    .guide-kicker {
      color: var(--accent);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .guide-detail h2 { margin: 0; font-size: 24px; line-height: 1.12; }
    .guide-detail h3 { margin: 5px 0 16px; color: var(--muted); font-size: 15px; font-weight: 650; }
    .guide-section { margin-top: 18px; }
    .guide-section-title { margin: 0 0 8px; color: var(--accent); font-size: 13px; font-weight: 850; }
    .guide-eje { color: #d9d6e6; border-left: 2px solid rgba(240,179,91,.55); padding-left: 10px; }
    .guide-points { margin: 0; padding-left: 21px; color: var(--muted); }
    .guide-points li + li { margin-top: 5px; }
    .linked-reading {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 8px;
      align-items: start;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }
    .linked-reading:first-child { border-top: 0; }
    .linked-title { font-weight: 760; font-size: 14px; }
    .linked-meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .linked-state { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .linked-reading.done .linked-title { color: rgba(244,242,236,.72); }
    .raw-guide-text { white-space: pre-wrap; color: var(--muted); font-size: 13px; }

    @media (max-width: 980px) {
      body { overflow: auto; height: auto; }
      .page { height: auto; min-height: 100vh; }
      header { display: block; }
      .top-progress { justify-content: flex-start; text-align: left; min-width: 0; margin-top: 10px; }
      .tabs { flex-wrap: wrap; }
      .tab { flex: 1 1 160px; }
      .tab-tools { width: 100%; margin-left: 0; }
      .search { width: 100%; max-width: none; flex: 1; }
      main { flex: unset; }
      .board { grid-template-columns: 1fr; height: auto; }
      .column-body { overflow: visible; }
      .guide-view { grid-template-columns: 1fr; height: auto; }
      .guide-tree,
      .guide-detail { overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Plan de lectura — Psicoanálisis Freud</h1>
      <div class="top-progress" id="topProgress"></div>
    </header>
    <nav class="tabs" id="tabs"></nav>
    <main id="app"></main>
  </div>
  <div id="helpBubble"></div>

  <script>
    /*
      AUDIT NOTE: Tres ensayos
      - Práctico IV: cap. I puntos 4 y 5 + cap. II, pp. 148–154, 157–188. Fuente preferida: Libro 2 / 1.
      - Seminario V: cap. III, punto 5, pp. 202–210. Fuente preferida: Libro 1.
      These are distinct fragments and must not share progress.
    */
    let readings = [];
    let guides = [];
    const STORAGE_KEY = "freud-laznik-modulos-3-4-progress-v15";
    const LEGACY_KEYS = [
      "freud-laznik-modulos-3-4-progress-v14", "freud-laznik-modulos-3-4-progress-v13", "freud-laznik-modulos-3-4-progress-v12", "freud-laznik-modulos-3-4-progress-v11", "freud-laznik-modulos-3-4-progress-v10", "freud-laznik-modulos-3-4-progress-v9",
      "freud-laznik-modulos-3-4-progress-v8", "freud-laznik-modulos-3-4-progress-v7",
      "freud-laznik-modulos-3-4-progress-v6", "freud-laznik-modulos-3-4-progress-v5",
      "freud-laznik-modulos-3-4-progress-v4", "freud-laznik-modulos-3-4-progress-v3",
      "freud-laznik-modulos-3-4-progress-v2", "freud-laznik-modulos-3-4-progress-v1"
    ];
    const modules = ["Módulo 3", "Módulo 4"];
    const GUIDE_TAB = "Programa / Guías";
    const blocks = ["Teóricos", "Prácticos", "Seminarios"];
    let activeModule = localStorage.getItem("freud-active-module") || "Módulo 3";
    if (![...modules, GUIDE_TAB].includes(activeModule)) activeModule = "Módulo 3";
    let openCards = JSON.parse(localStorage.getItem("freud-open-cards") || "{}");
    let customOrder = JSON.parse(localStorage.getItem("freud-card-order-v1") || "{}");
    let draggedId = null;
    let hideRepeats = JSON.parse(localStorage.getItem("freud-hide-repeats") || "false");
    let hideRead = JSON.parse(localStorage.getItem("freud-hide-read") || "false");
    let activeGuideTopic = localStorage.getItem("freud-active-guide-topic") || "";
    let searchQuery = "";
    let columnScroll = {};


    const INCLUSION_RULES = [
      {
        bigger: "pulsiones y destinos de pulsion::113 122",
        smaller: "pulsiones y destinos de pulsion::121 122"
      }
    ];
    function normalizedIdForInclusion(id) {
      return String(id || "")
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }
    function impliedByLargerReading(progress, pid) {
      const nPid = normalizedIdForInclusion(pid);
      return INCLUSION_RULES.some(rule => {
        return normalizedIdForInclusion(rule.smaller) === nPid
          && progress[rule.bigger] === true;
      });
    }

    function getProgress() {
      try {
        let current = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (current) return current;
        for (const key of LEGACY_KEYS) {
          const old = JSON.parse(localStorage.getItem(key) || "null");
          if (old) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(old));
            return old;
          }
        }
        return {};
      } catch { return {}; }
    }
    function setProgress(progress) { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
    function cardIdFor(r, i) { return `${i}-${r.module}-${r.unit}-${r.title}-${r.canonicalPages || r.pages}`.replace(/\s+/g, "_"); }
    function progressIdFor(r) { return r.readingId || `${r.title}-${r.canonicalPages || r.pages}`; }
    function isChecked(r, i) {
      const progress = getProgress();
      const pid = progressIdFor(r);
      if (progress[pid] !== undefined) return progress[pid];
      if (impliedByLargerReading(progress, pid)) return true;
      const legacy = cardIdFor(r, i);
      if (progress[legacy] !== undefined) return progress[legacy];
      return false;
    }
    function setChecked(r, i, value) {
      saveColumnScroll();
      const progress = getProgress();
      progress[progressIdFor(r)] = value;
      setProgress(progress);
      render();
    }
    function toggleOpen(r, i) {
      saveColumnScroll();
      const id = cardIdFor(r, i);
      openCards[id] = !openCards[id];
      localStorage.setItem("freud-open-cards", JSON.stringify(openCards));
      render();
    }
    function isOpen(r, i) { return !!openCards[cardIdFor(r, i)]; }
    function groupKey(r) { return `${r.module}::${r.block}`; }
    function canonicalId(r, i) { return cardIdFor(r, i); }
    function ordered(items) {
      if (!items.length) return items;
      const key = groupKey(items[0]);
      const order = customOrder[key] || [];
      const index = new Map(order.map((id, i) => [id, i]));
      return items.slice().sort((a, b) => {
        const aid = canonicalId(a, a.i), bid = canonicalId(b, b.i);
        const ai = index.has(aid) ? index.get(aid) : Number.MAX_SAFE_INTEGER;
        const bi = index.has(bid) ? index.get(bid) : Number.MAX_SAFE_INTEGER;
        if (ai !== bi) return ai - bi;
        return (a.order || 0) - (b.order || 0);
      });
    }
    function saveOrderForGroup(groupItems) {
      if (!groupItems.length) return;
      const key = groupKey(groupItems[0]);
      customOrder[key] = groupItems.map(r => canonicalId(r, r.i));
      localStorage.setItem("freud-card-order-v1", JSON.stringify(customOrder));
    }
    function saveColumnScroll() {
      document.querySelectorAll(".column").forEach(col => {
        const block = col.dataset.block;
        const body = col.querySelector(".column-body");
        if (block && body) columnScroll[`${activeModule}::${block}`] = body.scrollTop;
      });
    }
    function restoreColumnScroll() {
      requestAnimationFrame(() => {
        document.querySelectorAll(".column").forEach(col => {
          const block = col.dataset.block;
          const body = col.querySelector(".column-body");
          const key = `${activeModule}::${block}`;
          if (body && columnScroll[key] !== undefined) body.scrollTop = columnScroll[key];
        });
      });
    }
    function uniqueReadings(items) {
      const seen = new Set();
      return items.map((r, i) => (r.i === undefined ? {...r, i} : r)).filter(r => {
        const id = progressIdFor(r);
        if (seen.has(id)) return false;
        seen.add(id);
        return true;
      });
    }
    function primaryIdsForModule(moduleName) {
      const seen = new Set();
      const primary = new Set();
      readings
        .map((r, i) => ({...r, i}))
        .filter(r => r.module === moduleName)
        .sort((a, b) => (a.order || 0) - (b.order || 0))
        .forEach(r => {
          const pid = progressIdFor(r);
          if (!seen.has(pid)) {
            seen.add(pid);
            primary.add(cardIdFor(r, r.i));
          }
        });
      return primary;
    }
    
    function estimatePages(pages) {
      const s = String(pages || "");
      let total = 0;
      const re = /(\d+)\s*[–-]\s*(\d+)|(\d+)/g;
      let m;
      while ((m = re.exec(s)) !== null) {
        if (m[1] && m[2]) {
          const a = Number(m[1]), b = Number(m[2]);
          if (!Number.isNaN(a) && !Number.isNaN(b)) total += Math.max(1, Math.abs(b - a) + 1);
        } else if (m[3]) {
          total += 1;
        }
      }
      return total;
    }
    function pageProgress(items) {
      const unique = uniqueReadings(items);
      const total = unique.reduce((sum, r) => sum + estimatePages(r.canonicalPages || r.pages), 0);
      const done = unique
        .filter(r => isChecked(r, r.i))
        .reduce((sum, r) => sum + estimatePages(r.canonicalPages || r.pages), 0);
      return { done, total };
    }
    function renderDots(items) {
      const unique = uniqueReadings(items);
      const done = unique.filter(r => isChecked(r, r.i)).length;
      return unique.map((_, idx) => `<span class="dot ${idx < done ? "done" : ""}"></span>`).join("");
    }

    function renderTopProgress() {
      const unique = uniqueReadings(readings);
      const done = unique.filter(r => isChecked(r, r.i)).length;
      const pct = Math.round((done / unique.length) * 100);
      document.getElementById("topProgress").innerHTML = `
        <span class="progress-pill">Progreso: <strong>${pct}%</strong></span>
        <span class="reset-wrap"><button class="icon-btn" id="resetBtn" aria-label="Resetear progreso">↺</button><span class="reset-tip">Resetear progreso</span></span>
        <a class="github-link" href="https://github.com/javifernandes/psicoanalisis-freud-laznik-lectura-2do-parcial/" target="_blank" rel="noopener noreferrer" aria-label="Ver proyecto en GitHub">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.64 0 8.13c0 3.59 2.29 6.63 5.47 7.71.4.08.55-.18.55-.39 0-.19-.01-.83-.01-1.51-2.01.38-2.53-.5-2.69-.96-.09-.23-.48-.96-.82-1.15-.28-.15-.68-.52-.01-.53.63-.01 1.08.59 1.23.83.72 1.23 1.87.88 2.33.67.07-.53.28-.88.51-1.09-1.78-.21-3.64-.9-3.64-4.01 0-.89.31-1.61.82-2.18-.08-.21-.36-1.04.08-2.15 0 0 .67-.22 2.2.83A7.43 7.43 0 0 1 8 3.93c.68 0 1.36.09 2 .27 1.53-1.05 2.2-.83 2.2-.83.44 1.11.16 1.94.08 2.15.51.57.82 1.29.82 2.18 0 3.12-1.87 3.8-3.65 4.01.29.25.54.75.54 1.52 0 1.1-.01 1.98-.01 2.25 0 .21.15.47.55.39A8.04 8.04 0 0 0 16 8.13C16 3.64 12.42 0 8 0z"/>
          </svg>
        </a>
      `;
      document.getElementById("resetBtn").addEventListener("click", () => {
        if (confirm("¿Borrar el progreso guardado en este navegador?")) {
          localStorage.removeItem(STORAGE_KEY);
          LEGACY_KEYS.forEach(key => localStorage.removeItem(key));
          localStorage.removeItem("freud-open-cards");
          localStorage.removeItem("freud-card-order-v1");
          localStorage.removeItem("freud-hide-repeats");
          localStorage.removeItem("freud-hide-read");
          openCards = {};
          customOrder = {};
          hideRepeats = false;
          hideRead = false;
          render();
        }
      });
    }
    function renderTabs() {
      const tabs = document.getElementById("tabs");
      const guideTopicCount = guides.reduce((sum, guide) => sum + guide.blocks.reduce((blockSum, block) => blockSum + block.topics.length, 0), 0);
      const moduleButtons = modules.map(m => {
        const moduleItems = readings.map((r, i) => ({...r, i})).filter(r => r.module === m);
        const unique = uniqueReadings(moduleItems);
        const done = unique.filter(r => isChecked(r, r.i)).length;
        return `<button class="tab ${m === activeModule ? 'active' : ''}" data-module="${m}">
          ${m}<small>${done}/${unique.length}</small>
        </button>`;
      }).join("");
      const guideButton = `<button class="tab ${GUIDE_TAB === activeModule ? 'active' : ''}" data-module="${GUIDE_TAB}">
        Programa / Guías<small>${guideTopicCount}</small>
      </button>`;
      const tools = activeModule === GUIDE_TAB ? "" : `
        <div class="tab-tools">
          <input class="search" id="searchInput" value="${escapeHtml(searchQuery)}" placeholder="Buscar..." />
          <label class="toggle" title="Oculta repeticiones exactas dentro del módulo">
            <input type="checkbox" id="hideRepeats" ${hideRepeats ? "checked" : ""}>
            ocultar repetidos
          </label>
          <label class="toggle" title="Oculta lecturas ya marcadas como leídas">
            <input type="checkbox" id="hideRead" ${hideRead ? "checked" : ""}>
            ocultar leído
          </label>
        </div>
      `;
      tabs.innerHTML = moduleButtons + guideButton + tools;
      tabs.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          saveColumnScroll();
          activeModule = btn.dataset.module;
          localStorage.setItem("freud-active-module", activeModule);
          hideHelp();
          render();
        });
      });
      const hideRepeatsInput = document.getElementById("hideRepeats");
      if (hideRepeatsInput) {
        hideRepeatsInput.addEventListener("change", e => {
          hideRepeats = e.target.checked;
          localStorage.setItem("freud-hide-repeats", JSON.stringify(hideRepeats));
          render();
        });
      }
      const hideReadInput = document.getElementById("hideRead");
      if (hideReadInput) {
        hideReadInput.addEventListener("change", e => {
          hideRead = e.target.checked;
          localStorage.setItem("freud-hide-read", JSON.stringify(hideRead));
          render();
        });
      }
      const searchInput = document.getElementById("searchInput");
      if (!searchInput) return;
      searchInput.addEventListener("input", e => {
        searchQuery = e.target.value;
        render();
        setTimeout(() => {
          const next = document.getElementById("searchInput");
          if (next) {
            next.focus();
            next.setSelectionRange(next.value.length, next.value.length);
          }
        }, 0);
      });
    }
    function render() {
      renderTopProgress();
      renderTabs();
      if (activeModule === GUIDE_TAB) {
        renderGuideView();
        return;
      }
      const primaryIds = primaryIdsForModule(activeModule);
      let filtered = ordered(readings.map((r, i) => ({...r, i})).filter(r => r.module === activeModule));
      if (searchQuery.trim()) {
        const q = searchQuery.trim().toLowerCase();
        filtered = filtered.filter(r => Object.values(r).join(" ").toLowerCase().includes(q));
      }
      if (hideRepeats) {
        filtered = filtered.filter(r => primaryIds.has(cardIdFor(r, r.i)));
      }
      if (hideRead) {
        filtered = filtered.filter(r => !isChecked(r, r.i));
      }
      const app = document.getElementById("app");
      const columns = blocks.map(block => {
        const items = ordered(filtered.filter(r => r.block === block));
        const primaryItems = items.filter(r => !r.isDuplicateReading || primaryIds.has(cardIdFor(r, r.i)));
        const done = uniqueReadings(primaryItems).filter(r => isChecked(r, r.i)).length;
        const total = uniqueReadings(primaryItems).length;
        const pages = pageProgress(primaryItems);
        return `
          <section class="column" data-block="${block}">
            <h2>
              <span class="column-title">${block}</span>
              <span class="dot-progress" title="${done}/${total} lecturas">${renderDots(primaryItems)}</span>
              <span class="page-effort" title="Páginas leídas / páginas totales estimadas">${pages.done}/${pages.total}p</span>
            </h2>
            <div class="column-body">
              ${items.length ? items.map(r => {
                const checked = isChecked(r, r.i);
                const open = isOpen(r, r.i);
                const isPrimaryDuplicate = r.isDuplicateReading && primaryIds.has(cardIdFor(r, r.i));
                const isSecondaryDuplicate = r.isDuplicateReading && !isPrimaryDuplicate;
                const duplicateText = isPrimaryDuplicate
                  ? `Esta lectura aparece ${r.duplicateCount} veces en el módulo. Esta es la primera aparición; el progreso se comparte con las demás.`
                  : `Esta lectura ya apareció antes en el módulo. El progreso se comparte con la primera tarjeta.`;
                return `
                  <div class="reading ${checked ? 'done' : ''} ${open ? 'open' : ''} ${!isSecondaryDuplicate ? 'active-instance' : ''} ${isSecondaryDuplicate ? 'duplicate-secondary' : ''}" draggable="true" data-card-i="${r.i}">
                    <label class="check-wrap" title="Marcar como leído">
                      <input type="checkbox" ${checked ? 'checked' : ''} data-i="${r.i}">
                      <span class="fake-check"></span>
                    </label>
                    <div>
                      <div class="title" data-open-i="${r.i}"><span class="unit-prefix">${escapeHtml(r.unitDisplay || r.unitShort || r.unit)}:</span>${escapeHtml(r.title)} <span class="year">${escapeHtml(r.year)}</span></div>
                      <div class="bookline">
                        <strong>${escapeHtml(r.sourceDisplay || r.canonicalBook || r.book)}</strong> · pp. ${escapeHtml(r.canonicalPages || r.pages)}
                        ${r.isDuplicateReading ? `<span class="dup-mark" data-help="${escapeHtml(duplicateText)}">${isPrimaryDuplicate ? "↔" : "↩"}</span>` : ""}
                        ${(r.alsoIn || []).length ? `<span class="help" data-help="${escapeHtml(r.sourceHelp || r.canonicalReason || "Fuente canónica de lectura.")}">?</span>` : ""}
                      </div>
                    </div>
                    <span class="drag-handle" title="Arrastrar para reordenar">⋮⋮</span>
                    <button class="expand-btn" data-open-i="${r.i}" title="Ver ejes de guía">›</button>
                    <div class="details">
                      ${r.guideNote ? `<div class="guide-note">${escapeHtml(r.guideNote)}</div>` : ''}
                      ${r.notes ? `<div class="notes">${escapeHtml(r.notes)}</div>` : ''}
                      ${r.warning ? `<div class="warning-note">⚠️ ${escapeHtml(r.warning)}</div>` : ''}
                      ${r.externalLink ? `<a class="external-link" href="${escapeHtml(r.externalLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(r.externalLabel || "Ver fuente")}</a>` : ''}
                    </div>
                  </div>
                `;
              }).join("") : '<div class="empty">Sin lecturas.</div>'}
            </div>
          </section>
        `;
      }).join("");
      app.innerHTML = `<div class="board">${columns}</div>`;
      document.querySelectorAll('input[type="checkbox"][data-i]').forEach(cb => {
        cb.addEventListener("change", e => {
          const i = Number(e.target.dataset.i);
          setChecked(readings[i], i, e.target.checked);
        });
      });
      document.querySelectorAll('[data-open-i]').forEach(el => {
        el.addEventListener("click", e => {
          const i = Number(e.currentTarget.dataset.openI);
          toggleOpen(readings[i], i);
        });
      });
      document.querySelectorAll('[data-help]').forEach(el => {
        el.addEventListener("click", e => {
          e.stopPropagation();
          showHelp(e.currentTarget, e.currentTarget.dataset.help);
        });
      });
      document.querySelectorAll('.reading[draggable="true"]').forEach(card => {
        card.addEventListener("dragstart", e => {
          draggedId = card.dataset.cardI;
          card.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", draggedId);
        });
        card.addEventListener("dragend", () => {
          draggedId = null;
          document.querySelectorAll(".reading").forEach(c => c.classList.remove("dragging", "drag-over"));
        });
        card.addEventListener("dragover", e => {
          e.preventDefault();
          if (draggedId !== card.dataset.cardI) card.classList.add("drag-over");
        });
        card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
        card.addEventListener("drop", e => {
          e.preventDefault();
          const fromI = Number(e.dataTransfer.getData("text/plain") || draggedId);
          const toI = Number(card.dataset.cardI);
          if (Number.isNaN(fromI) || Number.isNaN(toI) || fromI === toI) return;
          const from = readings[fromI], to = readings[toI];
          if (!from || !to || from.module !== to.module || from.block !== to.block) return;
          const groupItems = ordered(readings.map((r, i) => ({...r, i})).filter(r => r.module === from.module && r.block === from.block));
          const fromIdx = groupItems.findIndex(r => r.i === fromI);
          const toIdx = groupItems.findIndex(r => r.i === toI);
          if (fromIdx < 0 || toIdx < 0) return;
          const [moved] = groupItems.splice(fromIdx, 1);
          groupItems.splice(toIdx, 0, moved);
          saveOrderForGroup(groupItems);
          render();
        });
      });
      restoreColumnScroll();
    }
    function allGuideTopics() {
      return guides.flatMap(guide => guide.blocks.flatMap(block => block.topics.map(topic => ({ guide, block, topic }))));
    }
    function normalizeText(s) {
      return String(s || "")
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/ª|º/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }
    function findLinkedReadings(topic) {
      const refs = topic.readingRefs || [];
      const matches = [];
      refs.forEach(ref => {
        const refTitle = normalizeText(ref.title);
        const refPages = normalizeText(ref.pages || "");
        readings.forEach((reading, i) => {
          const readingTitle = normalizeText(reading.title);
          const pages = normalizeText(reading.canonicalPages || reading.pages || "");
          const titleMatches = refTitle && (readingTitle.includes(refTitle) || refTitle.includes(readingTitle));
          const pagesMatch = !refPages || pages === refPages || pages.includes(refPages) || refPages.includes(pages);
          if (titleMatches && pagesMatch) matches.push({...reading, i});
        });
      });
      return uniqueReadings(matches);
    }
    function renderGuideView() {
      const app = document.getElementById("app");
      const topics = allGuideTopics();
      if (!topics.length) {
        app.innerHTML = `<div class="guide-view"><div class="empty">No hay guías cargadas.</div></div>`;
        return;
      }
      let selected = topics.find(item => item.topic.id === activeGuideTopic) || topics[0];
      activeGuideTopic = selected.topic.id;
      const linked = findLinkedReadings(selected.topic);
      const linkedDone = linked.filter(r => isChecked(r, r.i)).length;
      app.innerHTML = `
        <div class="guide-view">
          <aside class="guide-tree" aria-label="Árbol de guías">
            ${guides.map(guide => `
              <div class="guide-module">
                <h2 class="guide-module-title"><span>${escapeHtml(guide.label)}</span>${escapeHtml(guide.title)}</h2>
                ${guide.blocks.map(block => `
                  <div class="guide-block">
                    <h3 class="guide-block-title">${escapeHtml(block.label)}</h3>
                    ${block.topics.map(topic => `
                      <button class="guide-topic-btn ${topic.id === selected.topic.id ? 'active' : ''}" data-topic-id="${escapeHtml(topic.id)}">
                        ${escapeHtml(topic.label)}
                      </button>
                    `).join("")}
                  </div>
                `).join("")}
              </div>
            `).join("")}
          </aside>
          <section class="guide-detail" aria-live="polite">
            <div class="guide-kicker">${escapeHtml(selected.guide.label)} · ${escapeHtml(selected.block.label)}</div>
            <h2>${escapeHtml(selected.topic.label)}</h2>
            <h3>${escapeHtml(selected.topic.title)}</h3>
            ${selected.topic.eje ? `
              <div class="guide-section">
                <p class="guide-section-title">Eje</p>
                <div class="guide-eje">${escapeHtml(selected.topic.eje)}</div>
              </div>
            ` : ""}
            ${(selected.topic.points || []).length ? `
              <div class="guide-section">
                <p class="guide-section-title">Puntos</p>
                <ol class="guide-points">
                  ${selected.topic.points.map(point => `<li>${escapeHtml(point)}</li>`).join("")}
                </ol>
              </div>
            ` : ""}
            <div class="guide-section">
              <p class="guide-section-title">Lecturas vinculadas ${linked.length ? `(${linkedDone}/${linked.length})` : ""}</p>
              ${linked.length ? linked.map(r => {
                const checked = isChecked(r, r.i);
                return `
                  <div class="linked-reading ${checked ? 'done' : ''}">
                    <label class="check-wrap" title="Marcar como leído">
                      <input type="checkbox" ${checked ? 'checked' : ''} data-guide-reading-i="${r.i}">
                      <span class="fake-check"></span>
                    </label>
                    <div>
                      <div class="linked-title">${escapeHtml(r.title)} <span class="year">${escapeHtml(r.year)}</span></div>
                      <div class="linked-meta">${escapeHtml(r.module)} · ${escapeHtml(r.block)} · ${escapeHtml(r.unitDisplay || r.unitShort || r.unit)} · ${escapeHtml(r.sourceDisplay || r.canonicalBook || r.book)} · pp. ${escapeHtml(r.canonicalPages || r.pages)}</div>
                      ${r.warning ? `<div class="warning-note">⚠️ ${escapeHtml(r.warning)}</div>` : ""}
                    </div>
                    <div class="linked-state">${checked ? "leído" : "pendiente"}</div>
                  </div>
                `;
              }).join("") : '<div class="empty">Sin lectura enlazada todavía.</div>'}
            </div>
            ${selected.topic.rawGuideText ? `
              <div class="guide-section">
                <p class="guide-section-title">Texto guía</p>
                <div class="raw-guide-text">${escapeHtml(selected.topic.rawGuideText)}</div>
              </div>
            ` : ""}
          </section>
        </div>
      `;
      document.querySelectorAll(".guide-topic-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeGuideTopic = btn.dataset.topicId;
          localStorage.setItem("freud-active-guide-topic", activeGuideTopic);
          render();
        });
      });
      document.querySelectorAll("[data-guide-reading-i]").forEach(cb => {
        cb.addEventListener("change", e => {
          const i = Number(e.target.dataset.guideReadingI);
          setChecked(readings[i], i, e.target.checked);
        });
      });
    }
    function showHelp(el, text) {
      const bubble = document.getElementById("helpBubble");
      bubble.textContent = text;
      bubble.style.display = "block";
      const rect = el.getBoundingClientRect();
      const width = Math.min(320, window.innerWidth - 24);
      bubble.style.maxWidth = width + "px";
      let left = rect.left + rect.width / 2 - width / 2;
      left = Math.max(12, Math.min(left, window.innerWidth - width - 12));
      let top = rect.bottom + 8;
      if (top + 90 > window.innerHeight) top = rect.top - 98;
      bubble.style.left = left + "px";
      bubble.style.top = top + "px";
    }
    function hideHelp() { document.getElementById("helpBubble").style.display = "none"; }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'}[m]));
    }
    document.addEventListener("click", e => {
      if (!e.target.closest(".help") && !e.target.closest(".dup-mark") && !e.target.closest("#helpBubble")) hideHelp();
    });
    async function loadData() {
      const [readingsRes, module3Res, module4Res] = await Promise.all([
        fetch("./data/readings.json"),
        fetch("./data/guides/module3.json"),
        fetch("./data/guides/module4.json")
      ]);
      readings = await readingsRes.json();
      guides = [await module3Res.json(), await module4Res.json()];
    }
    async function initApp() {
      try {
        await loadData();
        render();
      } catch (err) {
        document.getElementById("app").innerHTML = `<div class="guide-view"><div class="empty">No se pudieron cargar los datos. Si abriste el archivo directamente, probá con <code>npm run dev</code>.</div></div>`;
        console.error(err);
      }
    }
    initApp();
  </script>
</body>
